[pack]
# Local release list. The list uses GitHub latest-release asset URLs so new
# HATS releases work as long as the asset names stay the same.
pack_url=file:///config/mm-tools/releases.json

[installer]
# HATS installer payload location on your SD card.
payload=/switch/mm-tools/hats-installer.bin

# Staging path for HATS extraction.
staging_path=/config/mm-tools/hats-staging

# Installation mode options:
# overwrite, replace_ams, replace_ams_bl, clean
install_mode=clean

[firmware]
# Leave this as the default firmware source unless you also host firmware releases.
firmware_url=https://api.github.com/repos/sthetix/NXFW/releases
